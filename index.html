<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Vita — Daily Health Log</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet" />
<style>
  /* ========================================================================
     Carsensor風カラーパレット
     - メインカラー: 赤 #e60012 (ブランドアクセント)
     - ヘッダー: 紺 #1a3a6c
     - 背景: 白 / 薄グレー #f4f4f4
     - 罫線: #d0d0d0 / #e5e5e5
     - テキスト: #222 / #555 / #888
  ======================================================================== */
  :root {
    --brand: #f08300;
    --brand-dark: #d97400;
    --header: #1a3a6c;
    --header-dark: #122a4f;
    --text: #222;
    --text-sub: #555;
    --text-mute: #888;
    --bg: #f4f4f4;
    --bg-card: #fff;
    --border: #d0d0d0;
    --border-light: #e5e5e5;
    --good: #f08300;
    --warn: #c9302c;
  }

  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans JP', 'Hiragino Kaku Gothic ProN', 'Yu Gothic', Meiryo, sans-serif;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
    font-size: 14px;
    line-height: 1.5;
  }
  .num { font-feature-settings: 'tnum'; font-variant-numeric: tabular-nums; }
  input[type=number]::-webkit-inner-spin-button,
  input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
  input[type=number] { -moz-appearance: textfield; }

  /* ヘッダー（白基調、オレンジアクセント） */
  header {
    background: #fff;
    color: var(--text);
    border-bottom: 3px solid var(--brand);
    position: sticky; top: 0; z-index: 10;
    box-shadow: 0 1px 4px rgba(0,0,0,0.04);
  }
  .header-inner {
    max-width: 960px; margin: 0 auto;
    padding: 12px 16px;
    display: flex; align-items: center; justify-content: space-between;
    flex-wrap: wrap; gap: 12px;
  }
  .logo h1 {
    font-weight: 900; font-size: 22px; margin: 0; color: var(--text);
    letter-spacing: 0.02em;
    display: inline-flex; align-items: center; gap: 8px;
  }
  .logo h1::before {
    content: ''; display: inline-block;
    width: 6px; height: 22px; background: var(--brand);
  }
  .logo p {
    font-size: 11px; color: var(--text-mute);
    margin: 0; font-weight: 500;
  }

  main { max-width: 960px; margin: 0 auto; padding: 16px; padding-bottom: 100px; }
  .view { display: none; }
  .view.active { display: block; }

  /* スタックの間隔は狭く（情報密度重視） */
  .stack > * + * { margin-top: 16px; }

  /* セクション見出し */
  section h2 {
    font-weight: 700; font-size: 16px; margin: 0;
    padding: 10px 14px;
    background: #fff7ed;
    color: var(--text);
    border-left: 5px solid var(--brand);
    border-bottom: 1px solid var(--border-light);
    display: flex; align-items: center; gap: 10px;
  }
  section .subtitle {
    font-size: 12px; color: var(--text-sub);
    margin: 8px 0 12px 0;
  }

  /* 下部タブバー */
  .bottom-tabs {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: #fff;
    border-top: 1px solid var(--border);
    display: flex;
    z-index: 50;
    padding-bottom: env(safe-area-inset-bottom, 0);
    box-shadow: 0 -2px 8px rgba(0, 0, 0, 0.08);
  }
  .bottom-tab {
    flex: 1;
    background: none; border: none; cursor: pointer;
    padding: 10px 12px 12px;
    display: flex; flex-direction: column; align-items: center; gap: 3px;
    color: var(--text-mute); font-family: inherit;
    font-size: 11px; font-weight: 700;
    transition: color 0.15s, background 0.15s;
    position: relative;
    border-top: 3px solid transparent;
  }
  .bottom-tab svg { width: 22px; height: 22px; }
  .bottom-tab:hover { color: var(--text); background: #fafafa; }
  .bottom-tab.active {
    color: var(--brand);
    border-top-color: var(--brand);
  }

  /* 体重カードや統計カードのコンテナ */
  .card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 2px;
  }

  /* 数値入力 */
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .number-field { background: #fff; border: 1px solid var(--border); padding: 10px 12px; }
  .number-field .ftext { font-size: 11px; color: var(--text-sub); font-weight: 700; margin-bottom: 4px; }
  .number-field .ibox { display: flex; align-items: baseline; gap: 6px; }
  .number-field input {
    flex: 1; background: transparent; border: none; padding: 0;
    font-size: 22px; color: var(--text); min-width: 0; font-weight: 700;
    font-family: inherit;
  }
  .number-field input:focus { outline: none; }
  .number-field input::placeholder { color: #ccc; }
  .number-field .unit { font-size: 12px; color: var(--text-sub); }

  /* 統計グリッド */
  .stat-grid {
    display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 1px;
    background: var(--border); border: 1px solid var(--border);
    margin-bottom: 12px;
  }
  .stat { background: #fff; padding: 12px 14px; }
  .stat-label { font-size: 11px; color: var(--text-sub); font-weight: 700; margin-bottom: 4px; }
  .stat-val { font-size: 20px; font-weight: 700; color: var(--text); }
  .stat-val .stat-unit { font-size: 11px; color: var(--text-sub); margin-left: 3px; font-weight: 500; }
  .stat-val.good { color: var(--good); }
  .stat-val.warn { color: var(--warn); }

  /* チャートカード */
  .chart-card { margin-bottom: 12px; background: #fff; border: 1px solid var(--border); }
  .chart-card .chart-head {
    padding: 10px 12px;
    background: #fafafa;
    border-bottom: 1px solid var(--border-light);
    display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-wrap: wrap;
  }
  .chart-card h3 {
    font-size: 14px; font-weight: 700; margin: 0;
    border-left: 3px solid var(--brand); padding-left: 8px;
  }
  .chart-card .subtitle { display: none; }
  .chart-box { padding: 12px; }
  .chart-svg { width: 100%; height: auto; display: block; }
  .empty-state { text-align: center; padding: 48px 0; color: var(--text-mute); font-size: 13px; }

  /* Trends見出しと期間タブ */
  .trends-head {
    display: flex; justify-content: space-between; align-items: center;
    gap: 12px; flex-wrap: wrap; margin-bottom: 12px;
    background: #fff7ed; color: var(--text);
    padding: 10px 14px;
    border-left: 5px solid var(--brand);
    border-bottom: 1px solid var(--border-light);
  }
  .trends-head h2 {
    background: none !important; padding: 0 !important; border: none !important;
    font-size: 16px; color: var(--text);
  }
  .trends-head .subtitle { display: none; }

  /* 期間ナビゲーション */
  .period-nav {
    display: flex; align-items: center; justify-content: space-between;
    gap: 8px; padding: 8px 12px; margin-bottom: 12px;
    background: #fff; border: 1px solid var(--border-light);
  }
  .period-nav button {
    background: #fff; border: 1px solid var(--border);
    cursor: pointer; padding: 6px 12px;
    font-size: 12px; font-weight: 700; color: var(--text-sub);
    font-family: inherit;
    display: inline-flex; align-items: center; gap: 4px;
    transition: all 0.1s;
  }
  .period-nav button:hover:not(:disabled) {
    border-color: var(--brand); color: var(--brand);
  }
  .period-nav button:disabled {
    opacity: 0.3; cursor: not-allowed;
  }
  .period-label {
    font-size: 13px; font-weight: 700; color: var(--text);
    text-align: center; flex: 1;
  }

  /* 期間切替セグメント */
  .range-tabs {
    display: flex; gap: 0; background: #fff;
    border: 1px solid var(--border); flex-wrap: wrap;
  }
  .range-tabs button {
    background: #fff; border: none; cursor: pointer;
    padding: 6px 12px; font-size: 12px; font-weight: 700;
    color: var(--text-sub); border-right: 1px solid var(--border-light);
    font-family: inherit;
    transition: all 0.1s;
  }
  .range-tabs button:last-child { border-right: none; }
  .range-tabs button:hover { background: #f0f0f0; color: var(--text); }
  .range-tabs button.active { background: var(--brand); color: #fff; }

  /* インライン編集テーブル */
  #records-container { overflow-x: auto; background: #fff; border: 1px solid var(--border); }
  .records-table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .records-table th {
    text-align: left; font-weight: 700; font-size: 11px;
    color: var(--text); background: #fff7ed;
    border-bottom: 2px solid var(--brand);
    padding: 8px 10px;
  }
  .records-table th.right { text-align: right; }
  .records-table td {
    padding: 8px 10px; border-bottom: 1px solid var(--border-light);
    color: var(--text);
  }
  .records-table td.right { text-align: right; }
  .records-table tr:nth-child(even) td { background: #fafafa; }
  .records-table tr:hover td { background: #fff5f5 !important; }
  .records-table tr:last-child td { border-bottom: none; }
  .records-table td.cell-edit { padding: 0; position: relative; min-width: 60px; }
  .records-table td.cell-edit input {
    width: 100%; height: 100%;
    background: transparent; border: none;
    padding: 8px 10px; text-align: right;
    font-size: 13px; color: var(--text); font-family: inherit; font-weight: 500;
    transition: background 0.1s;
  }
  .records-table td.cell-edit input:focus {
    outline: 2px solid var(--brand); outline-offset: -2px; background: #fffbe5;
  }
  .records-table td.cell-edit input::placeholder { color: #ccc; }
  .records-table tr.today-row td { background: #fff8f8 !important; font-weight: 700; }
  .records-table tr.today-row td:first-child { color: var(--brand); }
  .records-table tr.today-row td:first-child::before {
    content: 'TODAY'; background: var(--brand); color: #fff;
    font-size: 9px; font-weight: 700;
    padding: 1px 5px; border-radius: 2px; margin-right: 6px;
    vertical-align: middle;
  }
  .records-table .balance-cell { font-weight: 700; }
  .records-table td.deficit { color: var(--good); }
  .records-table td.surplus { color: var(--warn); }
  .records-table tr td:first-child { color: var(--text); font-size: 12px; white-space: nowrap; }

  /* 削除ボタン */
  .records-table th.del-th { width: 32px; }
  .records-table td.del-cell { padding: 4px; text-align: center; width: 32px; }
  .records-table .del-btn {
    background: transparent; border: none; cursor: pointer;
    padding: 4px; color: var(--text-mute);
    border-radius: 2px;
    display: inline-flex; align-items: center; justify-content: center;
    transition: all 0.1s;
  }
  .records-table .del-btn:hover {
    background: #fff0f0; color: var(--warn);
  }
  .records-table .del-btn svg { width: 14px; height: 14px; }

  /* 行追加・CSV行 */
  .add-day-row, .csv-row {
    display: flex; align-items: center; gap: 8px; padding: 10px;
    background: #fafafa; border: 1px solid var(--border); border-top: none;
    flex-wrap: wrap;
  }
  .add-day-row span:first-child, .csv-row span:first-child {
    font-size: 11px; color: var(--text-sub); font-weight: 700;
  }
  .add-day-row input[type=date] {
    font-family: inherit; font-size: 12px;
    background: #fff; border: 1px solid var(--border); border-radius: 2px;
    padding: 5px 8px; color: var(--text);
  }
  .add-day-row input[type=date]:focus { outline: none; border-color: var(--brand); }
  #add-date-btn, #csv-download-btn, #csv-import-btn {
    padding: 5px 12px; font-size: 12px; font-weight: 700;
    background: #fff; border: 1px solid var(--border);
    cursor: pointer; color: var(--text-sub);
    font-family: inherit;
    transition: all 0.1s;
    display: inline-flex; align-items: center;
  }
  #add-date-btn:hover, #csv-download-btn:hover, #csv-import-btn:hover {
    border-color: var(--brand); color: var(--brand);
  }

  /* Input ビュー */
  .input-card {
    background: #fff;
    border: 1px solid var(--border);
    padding: 24px 20px;
  }
  .input-card-date {
    font-size: 12px; font-weight: 700;
    color: var(--text-mute); letter-spacing: 0.15em;
    text-transform: uppercase; text-align: center;
    margin-bottom: 20px;
  }
  .input-row {
    display: flex; align-items: center; gap: 12px;
    padding: 10px 0;
    border-bottom: 1px solid var(--border-light);
  }
  .input-row:last-of-type { border-bottom: none; }
  .input-label {
    font-size: 14px; font-weight: 700; color: var(--text);
    width: 100px; flex-shrink: 0;
  }
  .input-control {
    flex: 1;
    display: flex; align-items: baseline; gap: 8px;
    border-bottom: 2px solid var(--border);
    padding-bottom: 6px;
    transition: border-color 0.15s;
  }
  .input-control:focus-within { border-bottom-color: var(--brand); }
  .input-control input {
    flex: 1;
    background: transparent; border: none;
    font-size: 22px; font-weight: 700; color: var(--text);
    font-family: inherit; padding: 0;
    text-align: right;
    min-width: 0;
  }
  .input-control input:focus { outline: none; }
  .input-control input::placeholder { color: #ccc; }
  .input-unit { font-size: 14px; color: var(--text-sub); font-weight: 700; }
  .input-status {
    text-align: center; margin-top: 16px;
    font-size: 12px; color: var(--text-mute);
    min-height: 18px;
  }
  .input-status.saved { color: var(--good); font-weight: 700; }

  /* Detail ビュー（アコーディオン式） */
  .detail-list {
    display: flex; flex-direction: column; gap: 8px;
  }
  .detail-item {
    background: #fff; border: 1px solid var(--border);
    overflow: hidden;
    transition: border-color 0.15s;
  }
  .detail-item.is-today { border-left: 4px solid var(--brand); }
  .detail-item-head {
    display: flex; align-items: center; gap: 10px;
    padding: 12px 14px;
    cursor: pointer;
    user-select: none;
    transition: background 0.1s;
  }
  .detail-item-head:hover { background: #fafafa; }
  .detail-toggle {
    background: transparent; border: none; cursor: pointer;
    padding: 0; display: inline-flex; align-items: center; justify-content: center;
    color: var(--text-mute);
    transition: transform 0.2s;
    flex-shrink: 0;
  }
  .detail-toggle-icon { width: 18px; height: 18px; transition: transform 0.2s; }
  .detail-item.is-open .detail-toggle-icon { transform: rotate(180deg); }
  .detail-item-head-text {
    display: flex; align-items: center; gap: 8px; flex: 1; flex-wrap: wrap;
  }
  .detail-item-date {
    font-size: 14px; font-weight: 700; color: var(--text);
  }
  .detail-item-day { font-size: 12px; color: var(--text-mute); }
  .detail-item-today-badge {
    background: var(--brand); color: #fff;
    font-size: 10px; font-weight: 700;
    padding: 2px 6px; border-radius: 2px;
  }
  .detail-note-mark {
    color: var(--brand);
    display: inline-flex; align-items: center;
  }
  .detail-item-body {
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.25s ease, padding 0.25s ease;
    padding: 0 14px;
  }
  .detail-item.is-open .detail-item-body {
    max-height: 1000px;
    padding: 0 14px 14px;
  }
  .detail-item-meta {
    font-size: 11px; color: var(--text-mute);
    margin-bottom: 8px;
    display: flex; gap: 12px; flex-wrap: wrap;
  }
  .detail-item-meta span strong { color: var(--text-sub); font-weight: 700; }
  .detail-note-area { transition: background 0.1s; }
  .detail-note-area:hover { background: #fafafa; }
  .detail-item-note {
    font-size: 13px; color: var(--text); line-height: 1.6;
    white-space: pre-wrap;
    word-break: break-word;
    background: #fafafa;
    padding: 10px 12px;
    border-left: 3px solid var(--brand);
  }
  .detail-item-note-empty {
    font-size: 12px; color: var(--text-mute); font-style: italic;
    padding: 10px 12px;
    border-left: 3px dashed var(--border);
  }
  .detail-empty {
    text-align: center; padding: 48px 20px;
    color: var(--text-mute); font-size: 13px;
  }

  /* tooltip */
  .chart-tooltip {
    position: absolute; pointer-events: none;
    background: #222; color: #fff;
    padding: 6px 10px; border-radius: 2px;
    font-size: 11px; font-weight: 500;
    box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    white-space: nowrap; z-index: 100;
    transition: opacity 0.1s;
    line-height: 1.5;
    border-left: 3px solid var(--brand);
  }

  /* モーダルダイアログ */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.4);
    z-index: 200;
    display: flex; align-items: center; justify-content: center;
    padding: 20px;
    animation: fadeIn 0.15s ease;
  }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  .modal {
    background: #fff;
    width: 100%; max-width: 480px;
    border-radius: 4px;
    border-top: 4px solid var(--brand);
    box-shadow: 0 8px 24px rgba(0,0,0,0.2);
    display: flex; flex-direction: column;
    max-height: calc(100vh - 40px);
  }
  .modal-head {
    padding: 12px 16px;
    border-bottom: 1px solid var(--border-light);
    display: flex; align-items: center; justify-content: space-between;
  }
  .modal-title { font-size: 14px; font-weight: 700; color: var(--text); }
  .modal-close {
    background: none; border: none; cursor: pointer;
    color: var(--text-mute); padding: 4px;
    display: inline-flex; align-items: center;
  }
  .modal-close:hover { color: var(--text); }
  .modal-textarea {
    flex: 1;
    width: 100%;
    min-height: 200px;
    padding: 14px 16px;
    border: none;
    background: #fff;
    font-family: inherit;
    font-size: 14px;
    line-height: 1.6;
    color: var(--text);
    resize: vertical;
  }
  .modal-textarea:focus { outline: none; background: #fffbe5; }
  .modal-foot {
    padding: 10px 16px;
    border-top: 1px solid var(--border-light);
    display: flex; gap: 8px; justify-content: flex-end;
    background: #fafafa;
  }
  .modal-btn-cancel, .modal-btn-save {
    padding: 7px 16px; font-size: 13px; font-weight: 700;
    cursor: pointer; font-family: inherit;
    border-radius: 2px; transition: all 0.1s;
  }
  .modal-btn-cancel {
    background: #fff; border: 1px solid var(--border); color: var(--text-sub);
  }
  .modal-btn-cancel:hover {
    border-color: var(--text); color: var(--text);
  }
  .modal-btn-save {
    background: var(--brand); border: 1px solid var(--brand); color: #fff;
  }
  .modal-btn-save:hover {
    background: var(--brand-dark); border-color: var(--brand-dark);
  }

  /* メモアイコン（行に表示） */
  .note-indicator {
    display: inline-flex; align-items: center; justify-content: center;
    width: 14px; height: 14px;
    color: var(--brand);
    margin-left: 4px; vertical-align: middle;
  }
  .note-indicator svg { width: 12px; height: 12px; }
  .records-table tr.has-note td:first-child { cursor: pointer; }
  .records-table tr td:first-child { cursor: pointer; }

  @media (max-width: 640px) {
    main { padding: 12px; padding-bottom: 90px; }
    .grid-2 { grid-template-columns: 1fr; }
    .stat-grid { grid-template-columns: 1fr 1fr 1fr; }
    .stat { padding: 10px 8px; }
    .stat-label { font-size: 9px; }
    .stat-val { font-size: 15px; }
    .records-table { font-size: 11px; }
    .records-table th, .records-table td { padding: 6px 8px; }
    .records-table td.cell-edit { min-width: 48px; }
    .records-table td.cell-edit input { padding: 6px 8px; font-size: 11px; }
    .records-table tr.today-row td:first-child::before {
      content: '●'; padding: 0; background: none; color: var(--brand); font-size: 10px;
    }
    .chart-box { padding: 8px; }
    .trends-head { gap: 8px; padding: 6px 10px; }
    .trends-head h2 { font-size: 14px; }
    .period-nav { padding: 6px 10px; }
    .period-nav button { padding: 5px 10px; font-size: 11px; }
    .period-label { font-size: 12px; }
    .range-tabs button { padding: 5px 9px; font-size: 11px; }
    section h2 { font-size: 14px; padding: 6px 10px; }
    .chart-card h3 { font-size: 13px; }
    .header-inner { padding: 8px 12px; }
    .logo h1 { font-size: 18px; }
    .logo h1::before { width: 5px; height: 18px; }
    .logo p { display: none; }
  }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="logo">
      <h1>Vita</h1>
      <p>daily health log</p>
    </div>
  </div>
</header>

<main class="stack">
  <!-- Inputビュー -->
  <div class="view" id="view-input">
    <div class="stack">
      <section>
        <h2>Today's Input</h2>
        <div class="input-card">
          <div class="input-card-date" id="input-card-date">—</div>
          <div class="input-row">
            <label class="input-label">体重</label>
            <div class="input-control">

    <span>Detail</span>

<div class="chart-tooltip" id="chart-tooltip" style="opacity:0;"></div>

<script>
// ============================================================================
// ストレージ層: localStorage
// ============================================================================
const storage = {
  get(key) {
    try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : null; }
    catch (e) { return null; }
  },
  set(key, value) {
    try { localStorage.setItem(key, JSON.stringify(value)); return true; }
    catch (e) { return false; }
  },
};

// ============================================================================
// ユーティリティ
// ============================================================================
const todayStr = () => new Date().toISOString().split('T')[0];
const formatDate = (s) => { const d = new Date(s); return `${d.getMonth()+1}/${d.getDate()}`; };
const lastNDays = (n) => {
  const days = [];
  for (let i = n - 1; i >= 0; i--) {
    const d = new Date();
    d.setDate(d.getDate() - i);
    days.push(d.toISOString().split('T')[0]);
  }
  return days;
};
const makeDefaultDay = () => ({ weight: null, bodyFat: null, intake: null, burn: null, note: '' });

// 1日分を取得（なければデフォルト）
function getDay(d) {
  return { ...makeDefaultDay(), ...(storage.get(`day:${d}`) || {}) };
}

// 1日分を保存（全項目nullなら削除）
function setDayField(date, field, value) {
  const day = getDay(date);
  day[field] = value;
  const isEmpty = day.weight == null && day.bodyFat == null && day.intake == null && day.burn == null && (!day.note || day.note === '');
  if (isEmpty) {
    localStorage.removeItem(`day:${date}`);
  } else {
    storage.set(`day:${date}`, day);
    // データが入力されたら非表示リストから外す
    const hidden = storage.get('hidden-dates') || [];
    if (hidden.includes(date)) {
      storage.set('hidden-dates', hidden.filter(d => d !== date));
    }
  }
}

// ============================================================================
// 上部バランスカード（今日の収支）
// ============================================================================
// ============================================================================
// 推移ビュー（自前SVGチャート）
// ============================================================================

// 期間定義: { ラベル, 日数, 集計単位 }
const RANGES = {
  '7d':  { label: '7日',  days: 7,    bucket: 'day' },
  '1m':  { label: '1ヶ月', days: 30,   bucket: 'day' },
  '3m':  { label: '3ヶ月', days: 90,   bucket: 'week' },
  '6m':  { label: '半年', days: 180,  bucket: 'week' },
  '1y':  { label: '1年',  days: 365,  bucket: 'month' },
  '3y':  { label: '3年',  days: 1095, bucket: 'month' },
};
let currentRange = '1m';
let currentOffset = 0; // 0=最新、1=1期間前、2=2期間前...

// 指定期間の日数分の日付配列を取得（offsetで過去にスライド可能）
function getRangeDays(n, offset = 0) {
  const days = [];
  // offset期間分過去にずらす
  const endOffsetDays = offset * n;
  for (let i = n - 1 + endOffsetDays; i >= endOffsetDays; i--) {
    const d = new Date();
    d.setDate(d.getDate() - i);
    days.push(d.toISOString().split('T')[0]);
  }
  return days;
}

// 日別データ取得
function getDailyData(days) {
  return days.map(d => {
    const day = storage.get(`day:${d}`);
    if (!day) return { date: formatDate(d), dateRaw: d, intake: null, burn: null, balance: null, weight: null, bodyFat: null };
    const balance = (day.intake != null && day.burn != null) ? day.intake - day.burn : null;
    return { date: formatDate(d), dateRaw: d, intake: day.intake, burn: day.burn, balance, weight: day.weight, bodyFat: day.bodyFat };
  });
}

// 週単位の集計（月曜始まり）
function bucketByWeek(daily) {
  const buckets = new Map();
  daily.forEach(d => {
    const date = new Date(d.dateRaw);
    // 月曜の日付に丸める
    const day = date.getDay(); // 0=日 〜 6=土
    const diff = (day === 0 ? -6 : 1 - day);
    const monday = new Date(date);
    monday.setDate(date.getDate() + diff);
    const key = monday.toISOString().split('T')[0];
    if (!buckets.has(key)) buckets.set(key, []);
    buckets.get(key).push(d);
  });
  return Array.from(buckets.entries()).sort(([a], [b]) => a.localeCompare(b)).map(([key, items]) => aggregateBucket(key, items, 'week'));
}

// 月単位の集計
function bucketByMonth(daily) {
  const buckets = new Map();
  daily.forEach(d => {
    const key = d.dateRaw.slice(0, 7); // YYYY-MM
    if (!buckets.has(key)) buckets.set(key, []);
    buckets.get(key).push(d);
  });
  return Array.from(buckets.entries()).sort(([a], [b]) => a.localeCompare(b)).map(([key, items]) => aggregateBucket(key + '-01', items, 'month'));
}

function aggregateBucket(keyDate, items, kind) {
  const avg = (field) => {
    const vs = items.map(i => i[field]).filter(v => v != null);
    return vs.length ? vs.reduce((s, v) => s + v, 0) / vs.length : null;
  };
  const d = new Date(keyDate);
  let label;
  if (kind === 'week') {
    label = `${d.getMonth()+1}/${d.getDate()}`;
  } else {
    label = `${d.getFullYear().toString().slice(2)}/${d.getMonth()+1}`;
  }
  return {
    date: label,
    dateRaw: keyDate,
    intake: avg('intake'),
    burn: avg('burn'),
    balance: avg('balance'),
    weight: avg('weight'),
    bodyFat: avg('bodyFat'),
    _items: items,
  };
}

function renderTrends() {
  const range = RANGES[currentRange];
  const daily = getDailyData(getRangeDays(range.days, currentOffset));

  // 集計済みデータ（チャート用）
  let chartData;
  if (range.bucket === 'day') chartData = daily;
  else if (range.bucket === 'week') chartData = bucketByWeek(daily);
  else chartData = bucketByMonth(daily);

  // 統計
  const filledBalance = daily.filter(d => d.balance !== null);
  const filledWeight = daily.filter(d => d.weight !== null);
  const recordedDays = daily.filter(d => d.intake !== null || d.burn !== null || d.weight !== null).length;
  const avgBalance = filledBalance.length ? filledBalance.reduce((s, d) => s + d.balance, 0) / filledBalance.length : 0;

  let weightDelta = null;
  if (filledWeight.length >= 2) {
    weightDelta = filledWeight[filledWeight.length - 1].weight - filledWeight[0].weight;
  }

  // 期間ラベル（表示中の期間）
  const startDate = daily[0]?.dateRaw || '';
  const endDate = daily[daily.length - 1]?.dateRaw || '';
  const fmtMD = (s) => s ? `${s.slice(5,7).replace(/^0/,'')}/${s.slice(8).replace(/^0/,'')}` : '';
  const periodRangeText = startDate && endDate ? `${fmtMD(startDate)} 〜 ${fmtMD(endDate)}` : '';
  const periodLabel = currentOffset === 0
    ? `直近${range.label}（${periodRangeText}）`
    : `${range.label}前（${periodRangeText}）`;

  // 期間ナビ更新
  document.getElementById('period-label').textContent = periodRangeText || range.label;
  const prevBtn = document.getElementById('period-prev');
  const nextBtn = document.getElementById('period-next');
  prevBtn.disabled = false; // 過去はずっと辿れる（データなくても表示はOK）
  nextBtn.disabled = currentOffset === 0; // 0より未来はない

  // サブタイトル
  document.getElementById('trends-subtitle').textContent = `${periodLabel}の推移`;

  // 期間タブ（毎回再生成）
  const tabsEl = document.getElementById('range-tabs');
  tabsEl.innerHTML = '';
  Object.entries(RANGES).forEach(([key, r]) => {
    const btn = document.createElement('button');
    btn.textContent = r.label;
    if (key === currentRange) btn.classList.add('active');
    btn.addEventListener('click', () => {
      currentRange = key;
      currentOffset = 0; // 期間切替時はオフセットをリセット
      renderTrends();
    });
    tabsEl.appendChild(btn);
  });

  // 統計カード
  const sg = document.getElementById('stat-grid');
  const labelSuffix = `(${range.label})`;
  sg.innerHTML = `
    <div class="stat"><div class="stat-label">記録日数 ${labelSuffix}</div><div class="stat-val">${recordedDays}/${range.days}</div></div>
    <div class="stat"><div class="stat-label">平均収支 ${labelSuffix}</div><div class="stat-val ${avgBalance < 0 ? 'good' : avgBalance > 0 ? 'warn' : ''}">${filledBalance.length ? (avgBalance >= 0 ? '+' : '') + avgBalance.toFixed(0) : '—'}<span class="stat-unit">${filledBalance.length ? 'kcal' : ''}</span></div></div>
    <div class="stat"><div class="stat-label">体重変化 ${labelSuffix}</div><div class="stat-val ${weightDelta != null && weightDelta < 0 ? 'good' : weightDelta != null && weightDelta > 0 ? 'warn' : ''}">${weightDelta != null ? (weightDelta >= 0 ? '+' : '') + weightDelta.toFixed(1) : '—'}<span class="stat-unit">${weightDelta != null ? 'kg' : ''}</span></div></div>
  `;

  // チャート群
  const cc = document.getElementById('charts-container');
  cc.innerHTML = '';

  if (recordedDays === 0) {
    const empty = document.createElement('div');
    empty.className = 'empty-state';
    empty.textContent = 'この期間の記録がありません。';
    cc.appendChild(empty);
    return;
  }

  const bucketLabel = range.bucket === 'day' ? '日別' : range.bucket === 'week' ? '週平均' : '月平均';

  // 1. 体重 + 体脂肪率（折れ線、dual axis）
  const filledChartWeight = chartData.filter(d => d.weight !== null);
  const filledChartFat = chartData.filter(d => d.bodyFat !== null);
  if (filledChartWeight.length > 0 || filledChartFat.length > 0) {
    cc.appendChild(makeChartCard('Body Weight & Fat', `体重・体脂肪率の${bucketLabel}推移`, renderLineChart(chartData, [
      { key: 'weight',  color: '#333333', label: '体重',     axis: 'left',  unit: 'kg', decimals: 1 },
      { key: 'bodyFat', color: '#f08300', label: '体脂肪率', axis: 'right', unit: '%',  decimals: 1 },
    ], { autoY: true, autoYRight: true, bucket: range.bucket })));
  }

  // 2. カロリー収支（バー）
  const filledChartBalance = chartData.filter(d => d.balance !== null);
  if (filledChartBalance.length > 0) {
    cc.appendChild(makeChartCard('Caloric Balance', `${bucketLabel}カロリー収支`, renderBarChart(chartData, 'balance', range.bucket)));
  }

  // 3. 摂取vs消費（折れ線）
  const filledIntake = chartData.filter(d => d.intake !== null);
  if (filledIntake.length > 0) {
    cc.appendChild(makeChartCard('Intake vs Burn', `摂取と消費の${bucketLabel}推移`, renderLineChart(chartData, [
      { key: 'intake', color: '#333333', label: '摂取' },
      { key: 'burn', color: '#888888', dashed: true, label: '消費' },
    ], { unit: 'kcal', bucket: range.bucket })));
  }
}

// ============================================================================
// Input ビュー（今日の体重・体脂肪率・摂取・消費を入力）
// ============================================================================
function renderInput() {
  const today = todayStr();
  const day = getDay(today);
  const d = new Date(today);
  const dayName = ['日','月','火','水','木','金','土'][d.getDay()];
  const dateLabel = `${d.getFullYear()}/${d.getMonth()+1}/${d.getDate()} (${dayName})`;
  document.getElementById('input-card-date').textContent = `TODAY · ${dateLabel}`;

  document.getElementById('input-weight').value = day.weight ?? '';
  document.getElementById('input-bodyfat').value = day.bodyFat ?? '';
  document.getElementById('input-intake').value = day.intake ?? '';
  document.getElementById('input-burn').value = day.burn ?? '';
  document.getElementById('input-status').textContent = '—';
  document.getElementById('input-status').className = 'input-status';
}

let inputStatusTimer = null;
function flashSavedStatus() {
  const el = document.getElementById('input-status');
  el.textContent = '✓ 保存しました';
  el.className = 'input-status saved';
  if (inputStatusTimer) clearTimeout(inputStatusTimer);
  inputStatusTimer = setTimeout(() => {
    el.textContent = '—';
    el.className = 'input-status';
  }, 1500);
}

// 全角数字・記号を半角に変換
function toHalfWidth(s) {
  if (!s) return s;
  return s
    .replace(/[０-９]/g, ch => String.fromCharCode(ch.charCodeAt(0) - 0xFEE0))
    .replace(/．/g, '.')
    .replace(/。/g, '.')
    .replace(/ー/g, '-')
    .replace(/−/g, '-');
}

// イベントバインドは起動時に1回だけ
function bindInputView() {
  const fields = [
    { id: 'input-weight',  field: 'weight'  },
    { id: 'input-bodyfat', field: 'bodyFat' },
    { id: 'input-intake',  field: 'intake'  },
    { id: 'input-burn',    field: 'burn'    },
  ];
  fields.forEach(({ id, field }) => {
    const input = document.getElementById(id);
    input.addEventListener('input', () => {
      // 全角→半角変換
      const half = toHalfWidth(input.value);
      if (half !== input.value) input.value = half;
      const today = todayStr();
      const value = input.value === '' ? null : Number(input.value);
      if (input.value !== '' && isNaN(value)) return;
      setDayField(today, field, value);
      flashSavedStatus();
      debounceRenderTrends();
    });
  });
}

// ============================================================================
// Detail ビュー（日付ごとのメモ一覧、アコーディオン式）
// ============================================================================
const detailExpanded = new Set(); // 開いている日付を記憶

function renderDetail() {
  const c = document.getElementById('detail-container');
  // 入力済みの全日付を集める
  const dates = [];
  for (let i = 0; i < localStorage.length; i++) {
    const k = localStorage.key(i);
    if (k && k.startsWith('day:')) dates.push(k.slice(4));
  }
  dates.sort().reverse(); // 新しい順

  const today = todayStr();
  if (dates.length === 0) {
    c.innerHTML = '<div class="detail-empty">記録がありません。Inputタブから入力してみましょう。</div>';
    return;
  }

  // 初回表示時、今日のカードはデフォルトで開く
  if (detailExpanded.size === 0 && dates.includes(today)) {
    detailExpanded.add(today);
  }

  const escapeHtml = (s) => String(s)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;').replace(/'/g, '&#39;');

  c.innerHTML = `<div class="detail-list">${dates.map(date => {
    const day = getDay(date);
    const d = new Date(date);
    const dayName = ['日','月','火','水','木','金','土'][d.getDay()];
    const isToday = date === today;
    const isOpen = detailExpanded.has(date);
    const meta = [];
    if (day.weight != null) meta.push(`<span><strong>体重</strong> ${day.weight}kg</span>`);
    if (day.bodyFat != null) meta.push(`<span><strong>体脂肪</strong> ${day.bodyFat}%</span>`);
    if (day.intake != null) meta.push(`<span><strong>摂取</strong> ${day.intake}kcal</span>`);
    if (day.burn != null) meta.push(`<span><strong>消費</strong> ${day.burn}kcal</span>`);
    if (day.intake != null && day.burn != null) {
      const b = day.intake - day.burn;
      meta.push(`<span><strong>収支</strong> ${b >= 0 ? '+' : ''}${b}</span>`);
    }
    const hasNote = !!day.note;
    return `
      <div class="detail-item ${isToday ? 'is-today' : ''} ${isOpen ? 'is-open' : ''}" data-date="${date}">
        <div class="detail-item-head">
          <button class="detail-toggle" data-date="${date}" aria-expanded="${isOpen}">
            <svg class="detail-toggle-icon" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>
          </button>
          <div class="detail-item-head-text">
            <span class="detail-item-date">${date}</span>
            <span class="detail-item-day">(${dayName})</span>
            ${isToday ? '<span class="detail-item-today-badge">TODAY</span>' : ''}
            ${hasNote ? '<span class="detail-note-mark" title="メモあり"><svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" style="width:12px;height:12px;"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg></span>' : ''}
          </div>
        </div>
        <div class="detail-item-body">
          ${meta.length ? `<div class="detail-item-meta">${meta.join('')}</div>` : ''}
          <div class="detail-note-area" data-date="${date}">
            ${day.note
              ? `<div class="detail-item-note">${escapeHtml(day.note)}</div>`
              : `<div class="detail-item-note-empty">メモなし — タップで追加</div>`}
          </div>
        </div>
      </div>
    `;
  }).join('')}</div>`;

  // ヘッダークリックで開閉
  c.querySelectorAll('.detail-item-head').forEach(head => {
    head.addEventListener('click', (e) => {
      // ノート編集の領域クリックは別処理なので除外（このイベントはheadのみ）
      const date = head.parentElement.dataset.date;
      if (detailExpanded.has(date)) {
        detailExpanded.delete(date);
      } else {
        detailExpanded.add(date);
      }
      head.parentElement.classList.toggle('is-open');
      const btn = head.querySelector('.detail-toggle');
      btn.setAttribute('aria-expanded', detailExpanded.has(date));
    });
  });

  // メモ領域クリックでメモダイアログ
  c.querySelectorAll('.detail-note-area').forEach(area => {
    area.addEventListener('click', (e) => {
      e.stopPropagation();
      openNoteModal(area.dataset.date);
    });
    area.style.cursor = 'pointer';
  });
}

function renderRecordsTable() {
  const c = document.getElementById('records-container');

  const today = todayStr();

  // 全表示対象を集める：直近14日（今日含む） + 入力済み日 + 手動追加日
  const allDatesSet = new Set();
  // 直近14日（今日含む）
  lastNDays(14).forEach(d => allDatesSet.add(d));
  // 入力済み日（過去・未来含む）
  for (let i = 0; i < localStorage.length; i++) {
    const k = localStorage.key(i);
    if (k && k.startsWith('day:')) allDatesSet.add(k.slice(4));
  }
  // 手動追加した日付
  const extraDates = storage.get('extra-dates') || [];
  extraDates.forEach(d => allDatesSet.add(d));

  // 非表示にしたい日付（直近14日でデータ入力前に削除した行）
  const hiddenDates = storage.get('hidden-dates') || [];
  hiddenDates.forEach(d => allDatesSet.delete(d));

  // 新しい順にソート（YYYY-MM-DD形式なので文字列比較で正しくソートされる）
  const allDates = Array.from(allDatesSet).sort().reverse();

  const fmtCell = (v, suffix = '') => v == null
    ? '<span style="color:#d6d3d1;">—</span>'
    : `${typeof v === 'number' ? (Number.isInteger(v) ? v : v.toFixed(1)) : v}${suffix ? '<span style="color:#a8a29e;font-size:10px;margin-left:2px;">'+suffix+'</span>' : ''}`;

  const balanceCellHtml = (intake, burn) => {
    if (intake == null || burn == null) return '<td class="right balance-cell"><span style="color:#d6d3d1;">—</span></td>';
    const b = intake - burn;
    const cls = b < 0 ? 'deficit' : b > 0 ? 'surplus' : '';
    return `<td class="right balance-cell ${cls}">${b >= 0 ? '+' : ''}${b.toFixed(0)}</td>`;
  };

  // 各セルを編集可能なinputとして描画
  const editCell = (date, field, value, step, placeholder) => {
    const v = value == null ? '' : value;
    return `<td class="cell-edit"><input type="number" step="${step}" inputmode="decimal" data-date="${date}" data-field="${field}" value="${v}" placeholder="${placeholder}" /></td>`;
  };

  const rows = allDates.map(date => {
    const day = getDay(date);
    const hasData = day.intake != null || day.burn != null || day.weight != null || day.bodyFat != null;
    const isToday = date === today;
    const d = new Date(date);
    const dateLabel = `${d.getMonth()+1}/${d.getDate()}`;
    const dayName = ['日','月','火','水','木','金','土'][d.getDay()];

    return `
      <tr class="${isToday ? 'today-row' : ''} ${hasData ? 'has-data' : ''} ${day.note ? 'has-note' : ''}" data-date="${date}">
        <td class="date-cell" data-date="${date}">${dateLabel} <span style="color:#a8a29e;font-size:10px;">(${dayName})</span>${day.note ? '<span class="note-indicator" title="メモあり"><svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg></span>' : ''}</td>
        ${editCell(date, 'weight', day.weight, '0.1', '—')}
        ${editCell(date, 'bodyFat', day.bodyFat, '0.1', '—')}
        ${editCell(date, 'intake', day.intake, '10', '—')}
        ${editCell(date, 'burn', day.burn, '10', '—')}
        ${balanceCellHtml(day.intake, day.burn)}
        <td class="del-cell"><button class="del-btn" data-date="${date}" title="この行を削除"><svg fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-2 14a2 2 0 0 1-2 2H9a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6"/></svg></button></td>
      </tr>
    `;
  }).join('');

  c.innerHTML = `
    <table class="records-table">
      <thead>
        <tr>
          <th>DATE</th>
          <th class="right">体重 (kg)</th>
          <th class="right">体脂肪 (%)</th>
          <th class="right">摂取 (kcal)</th>
          <th class="right">消費 (kcal)</th>
          <th class="right">収支</th>
          <th class="del-th"></th>
        </tr>
      </thead>
      <tbody>${rows}</tbody>
    </table>
    <div class="add-day-row">
      <span style="font-size:11px; color:#78716c; letter-spacing:0.15em; text-transform:uppercase;">他の日付を追加:</span>
      <input type="date" id="add-date-input" value="${today}" max="${today}" />
      <button id="add-date-btn">追加</button>
    </div>
    <div class="csv-row">
      <span style="font-size:11px; color:#78716c; letter-spacing:0.15em; text-transform:uppercase;">CSV:</span>
      <input type="file" id="csv-import-input" accept=".csv,text/csv" style="display:none;" />
      <button id="csv-import-btn" title="CSVファイルから読み込み">
        <svg fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24" style="width:12px;height:12px;vertical-align:-1px;margin-right:4px;"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
        読込
      </button>
      <button id="csv-download-btn" title="全データをCSVでダウンロード">
        <svg fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24" style="width:12px;height:12px;vertical-align:-1px;margin-right:4px;"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        書出
      </button>
    </div>
  `;

  // 入力イベントをセル全体に委譲
  c.querySelector('table').addEventListener('input', (e) => {
    const input = e.target;
    if (input.tagName !== 'INPUT') return;
    // 全角→半角変換
    const half = toHalfWidth(input.value);
    if (half !== input.value) input.value = half;
    const date = input.dataset.date;
    const field = input.dataset.field;
    const value = input.value === '' ? null : Number(input.value);
    if (input.value !== '' && isNaN(value)) return; // 不正値は保存しない
    setDayField(date, field, value);
    // 該当行の収支セル更新
    const tr = input.closest('tr');
    const day = getDay(date);
    const balanceCell = tr.querySelector('.balance-cell');
    if (day.intake == null || day.burn == null) {
      balanceCell.innerHTML = '<span style="color:#d6d3d1;">—</span>';
      balanceCell.className = 'right balance-cell';
    } else {
      const b = day.intake - day.burn;
      balanceCell.textContent = (b >= 0 ? '+' : '') + b.toFixed(0);
      balanceCell.className = `right balance-cell ${b < 0 ? 'deficit' : b > 0 ? 'surplus' : ''}`;
    }
    // 今日の行が変更されたら推移グラフを更新
    debounceRenderTrends();
  });

  // 削除ボタン（クリック委譲）
  c.querySelector('table').addEventListener('click', (e) => {
    // 削除ボタン
    const btn = e.target.closest('.del-btn');
    if (btn) {
      const date = btn.dataset.date;
      if (!confirm(`${date} の行を削除しますか？`)) return;
      localStorage.removeItem(`day:${date}`);
      const extras = storage.get('extra-dates') || [];
      const newExtras = extras.filter(d => d !== date);
      if (newExtras.length !== extras.length) storage.set('extra-dates', newExtras);
      const recent14 = lastNDays(14);
      if (recent14.includes(date)) {
        const hidden = storage.get('hidden-dates') || [];
        if (!hidden.includes(date)) {
          hidden.push(date);
          storage.set('hidden-dates', hidden);
        }
      }
      renderRecordsTable();
      debounceRenderTrends();
      return;
    }
    // 日付セルクリック → メモダイアログ
    const dateCell = e.target.closest('.date-cell');
    if (dateCell) {
      openNoteModal(dateCell.dataset.date);
    }
  });

  // 日付追加ボタン
  document.getElementById('add-date-btn').addEventListener('click', () => {
    const d = document.getElementById('add-date-input').value;
    if (!d) return;
    if (d > todayStr()) {
      alert('未来の日付は追加できません。');
      return;
    }
    const extras = storage.get('extra-dates') || [];
    if (!extras.includes(d)) {
      extras.push(d);
      storage.set('extra-dates', extras);
    }
    renderRecordsTable();
    // 追加した行までスクロール
    setTimeout(() => {
      const tr = document.querySelector(`tr[data-date="${d}"]`);
      if (tr) {
        tr.scrollIntoView({ behavior: 'smooth', block: 'center' });
        const firstInput = tr.querySelector('input');
        if (firstInput) firstInput.focus();
      }
    }, 50);
  });

  // CSVダウンロードボタン
  document.getElementById('csv-download-btn').addEventListener('click', downloadCSV);

  // CSV読込ボタン
  const importBtn = document.getElementById('csv-import-btn');
  const importInput = document.getElementById('csv-import-input');
  importBtn.addEventListener('click', () => importInput.click());
  importInput.addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const text = ev.target.result;
        const result = importCSV(text);
        renderRecordsTable();
        debounceRenderTrends();
        alert(`${result.imported}件読み込みました${result.skipped > 0 ? `（${result.skipped}件スキップ）` : ''}`);
      } catch (err) {
        alert('読み込みエラー: ' + err.message);
      }
      importInput.value = ''; // 同じファイルを再選択できるようリセット
    };
    reader.readAsText(file);
  });
}

function importCSV(text) {
  // BOMを削除
  if (text.charCodeAt(0) === 0xFEFF) text = text.slice(1);

  const lines = text.split(/\r?\n/).filter(l => l.trim() !== '');
  if (lines.length < 2) throw new Error('データ行がありません');

  // ヘッダー解析
  const headers = lines[0].split(',').map(h => h.trim().toLowerCase());
  const idx = {
    date:    headers.findIndex(h => h === 'date'),
    weight:  headers.findIndex(h => h === 'weight_kg' || h === 'weight'),
    bodyFat: headers.findIndex(h => h === 'body_fat_pct' || h === 'body_fat' || h === 'bodyfat'),
    intake:  headers.findIndex(h => h === 'intake_kcal' || h === 'intake'),
    burn:    headers.findIndex(h => h === 'burn_kcal' || h === 'burn'),
    note:    headers.findIndex(h => h === 'note' || h === 'memo'),
  };
  if (idx.date < 0) throw new Error('date列が見つかりません');

  let imported = 0, skipped = 0;
  const overwrite = confirm(
    `${lines.length - 1}行のデータを読み込みます。\n\n` +
    `【OK】既存データを上書きする\n` +
    `【キャンセル】既存日付はスキップする`
  );

  for (let i = 1; i < lines.length; i++) {
    const cols = parseCSVLine(lines[i]);
    const date = cols[idx.date];
    if (!/^\d{4}-\d{2}-\d{2}$/.test(date)) { skipped++; continue; }
    if (date > todayStr()) { skipped++; continue; }
    if (!overwrite && storage.get(`day:${date}`)) { skipped++; continue; }

    const num = (i) => {
      if (i < 0) return null;
      const v = cols[i];
      if (v == null || v === '') return null;
      const n = Number(v);
      return isNaN(n) ? null : n;
    };
    const str = (i) => {
      if (i < 0) return '';
      return cols[i] || '';
    };

    const day = {
      weight:  num(idx.weight),
      bodyFat: num(idx.bodyFat),
      intake:  num(idx.intake),
      burn:    num(idx.burn),
      note:    str(idx.note),
    };
    // すべて空ならスキップ
    if (day.weight == null && day.bodyFat == null && day.intake == null && day.burn == null && !day.note) {
      skipped++;
      continue;
    }
    storage.set(`day:${date}`, day);
    imported++;
  }
  return { imported, skipped };
}

// 簡易CSVパーサー（クォート対応）
function parseCSVLine(line) {
  const result = [];
  let current = '';
  let inQuote = false;
  for (let i = 0; i < line.length; i++) {
    const c = line[i];
    if (inQuote) {
      if (c === '"' && line[i+1] === '"') { current += '"'; i++; }
      else if (c === '"') { inQuote = false; }
      else current += c;
    } else {
      if (c === '"') inQuote = true;
      else if (c === ',') { result.push(current.trim()); current = ''; }
      else current += c;
    }
  }
  result.push(current.trim());
  return result;
}

function downloadCSV() {
  // 全ての記録済み日付を収集
  const dates = [];
  for (let i = 0; i < localStorage.length; i++) {
    const k = localStorage.key(i);
    if (k && k.startsWith('day:')) dates.push(k.slice(4));
  }
  if (dates.length === 0) {
    alert('記録がありません。');
    return;
  }
  dates.sort(); // 古い順

  // CSV組み立て（Excel互換のため BOM を先頭に付ける）
  const header = ['date', 'weight_kg', 'body_fat_pct', 'intake_kcal', 'burn_kcal', 'balance_kcal', 'note'];
  // CSVフィールドのエスケープ（カンマ・改行・ダブルクォートを含む場合はクォート）
  const esc = (v) => {
    if (v == null || v === '') return '';
    const s = String(v);
    if (/[",\r\n]/.test(s)) return '"' + s.replace(/"/g, '""') + '"';
    return s;
  };
  const rows = dates.map(date => {
    const day = getDay(date);
    const balance = (day.intake != null && day.burn != null) ? (day.intake - day.burn) : '';
    return [
      esc(date),
      esc(day.weight),
      esc(day.bodyFat),
      esc(day.intake),
      esc(day.burn),
      esc(balance),
      esc(day.note),
    ].join(',');
  });
  const csv = '\uFEFF' + [header.join(','), ...rows].join('\n');

  // ダウンロード
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const ts = new Date().toISOString().split('T')[0];
  a.href = url;
  a.download = `vita_records_${ts}.csv`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 100);
}

function renderBarChart(data, key, bucket = 'day') {
  const isMobile = window.innerWidth < 640;
  const W = isMobile ? 480 : 800;
  const H = isMobile ? 280 : 240;
  const P = isMobile
    ? { t: 16, r: 12, b: 28, l: 40 }
    : { t: 20, r: 20, b: 30, l: 50 };
  const innerW = W - P.l - P.r, innerH = H - P.t - P.b;
  const values = data.map(d => d[key]).filter(v => v !== null);
  const maxV = values.length ? Math.max(...values, 0) : 100;
  const minV = values.length ? Math.min(...values, 0) : -100;
  const range = Math.max(Math.abs(maxV), Math.abs(minV)) * 1.1 || 100;

  const yScale = v => P.t + innerH/2 - (v / range) * (innerH/2);
  const barW = Math.max(2, innerW / data.length * 0.7);
  const barGap = innerW / data.length;

  // ラベル間引き：モバイルは少なめ
  const labelStep = Math.max(1, Math.ceil(data.length / (isMobile ? 7 : 10)));

  const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
  svg.setAttribute('viewBox', `0 0 ${W} ${H}`);
  svg.setAttribute('class', 'chart-svg');
  // aspect ratio保持（デフォルトのxMidYMid meet）

  const ticks = [-range, -range/2, 0, range/2, range];
  ticks.forEach(t => {
    const y = yScale(t);
    const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
    line.setAttribute('x1', P.l); line.setAttribute('x2', W - P.r);
    line.setAttribute('y1', y); line.setAttribute('y2', y);
    line.setAttribute('stroke', t === 0 ? '#555555' : '#e5e5e5');
    line.setAttribute('stroke-dasharray', t === 0 ? '' : '2 4');
    svg.appendChild(line);
    const txt = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    txt.setAttribute('x', P.l - 8); txt.setAttribute('y', y + 4);
    txt.setAttribute('text-anchor', 'end'); txt.setAttribute('font-size', '11');
    txt.setAttribute('fill', '#888888'); txt.setAttribute('font-family', 'Noto Sans JP, sans-serif');
    txt.textContent = Math.round(t);
    svg.appendChild(txt);
  });

  const bucketLabel = bucket === 'day' ? '' : bucket === 'week' ? '週平均' : '月平均';

  data.forEach((d, i) => {
    const cx = P.l + i * barGap + barGap/2;

    // ラベル間引き
    if (i % labelStep === 0 || i === data.length - 1) {
      const txt = document.createElementNS('http://www.w3.org/2000/svg', 'text');
      txt.setAttribute('x', cx); txt.setAttribute('y', H - 8);
      txt.setAttribute('text-anchor', 'middle'); txt.setAttribute('font-size', '10');
      txt.setAttribute('fill', '#888888'); txt.setAttribute('font-family', 'Noto Sans JP, sans-serif');
      txt.textContent = d.date;
      svg.appendChild(txt);
    }

    if (d[key] === null || d[key] === undefined) return;
    const y0 = yScale(0);
    const y1 = yScale(d[key]);
    const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
    rect.setAttribute('x', cx - barW/2);
    rect.setAttribute('y', Math.min(y0, y1));
    rect.setAttribute('width', barW);
    rect.setAttribute('height', Math.max(1, Math.abs(y1 - y0)));
    rect.setAttribute('fill', d[key] < 0 ? '#f08300' : d[key] > 0 ? '#c9302c' : '#888888');
    rect.setAttribute('rx', barW > 4 ? 2 : 0);
    rect.style.cursor = 'pointer';

    let tipHtml;
    if (bucket === 'day') {
      const intakeStr = d.intake != null ? d.intake : '—';
      const burnStr = d.burn != null ? d.burn : '—';
      tipHtml = `${d.date}<br>収支: ${d[key] >= 0 ? '+' : ''}${d[key].toFixed(0)} kcal<br>摂取 ${intakeStr} / 消費 ${burnStr}`;
    } else {
      const n = d._items ? d._items.filter(x => x.balance !== null).length : 0;
      tipHtml = `${d.date}<br>${bucketLabel}収支: ${d[key] >= 0 ? '+' : ''}${d[key].toFixed(0)} kcal<br>(${n}日分の平均)`;
    }
    rect.addEventListener('mouseenter', (e) => showTip(e, tipHtml));
    rect.addEventListener('mousemove', (e) => showTip(e, tipHtml));
    rect.addEventListener('mouseleave', hideTip);
    svg.appendChild(rect);
  });

  return svg;
}

function renderLineChart(data, series, opts = {}) {
  const isMobile = window.innerWidth < 640;
  const hasRightAxis = series.some(s => s.axis === 'right');
  const W = isMobile ? 480 : 800;
  const H = isMobile ? 280 : 240;
  const P = isMobile
    ? { t: 24, r: hasRightAxis ? 40 : 12, b: 28, l: 40 }
    : { t: 20, r: hasRightAxis ? 50 : 20, b: 30, l: 50 };
  const innerW = W - P.l - P.r, innerH = H - P.t - P.b;

  // axis別にスケールを計算
  const axes = { left: [], right: [] };
  series.forEach(s => {
    const ax = s.axis || 'left';
    data.forEach(d => {
      const v = d[s.key];
      if (v !== null && v !== undefined) axes[ax].push(v);
    });
  });

  function buildScale(vals, autoY) {
    if (vals.length === 0) return null;
    let minV, maxV;
    if (autoY) {
      minV = Math.min(...vals) - 1;
      maxV = Math.max(...vals) + 1;
    } else {
      minV = 0;
      maxV = Math.max(...vals) * 1.15 || 100;
    }
    const range = maxV - minV || 1;
    return {
      minV, maxV, range,
      scale: v => P.t + innerH - ((v - minV) / range) * innerH,
    };
  }

  const leftScale = buildScale(axes.left, opts.autoY);
  const rightScale = buildScale(axes.right, opts.autoYRight);

  const xScale = i => data.length === 1 ? P.l + innerW / 2 : P.l + (i / (data.length - 1)) * innerW;

  const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
  svg.setAttribute('viewBox', `0 0 ${W} ${H}`);
  svg.setAttribute('class', 'chart-svg');
  // aspect ratio保持（デフォルトのxMidYMid meet）

  // Y軸の目盛とグリッド線
  const tickCount = 4;
  if (leftScale) {
    for (let t = 0; t <= tickCount; t++) {
      const v = leftScale.minV + (leftScale.range * t / tickCount);
      const y = leftScale.scale(v);
      const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
      line.setAttribute('x1', P.l); line.setAttribute('x2', W - P.r);
      line.setAttribute('y1', y); line.setAttribute('y2', y);
      line.setAttribute('stroke', '#e5e5e5');
      line.setAttribute('stroke-dasharray', '2 4');
      svg.appendChild(line);
      const txt = document.createElementNS('http://www.w3.org/2000/svg', 'text');
      txt.setAttribute('x', P.l - 8); txt.setAttribute('y', y + 4);
      txt.setAttribute('text-anchor', 'end'); txt.setAttribute('font-size', '11');
      txt.setAttribute('fill', '#888888'); txt.setAttribute('font-family', 'Noto Sans JP, sans-serif');
      txt.textContent = v.toFixed(opts.autoY ? 1 : 0);
      svg.appendChild(txt);
    }
  }
  if (rightScale) {
    for (let t = 0; t <= tickCount; t++) {
      const v = rightScale.minV + (rightScale.range * t / tickCount);
      const y = rightScale.scale(v);
      const txt = document.createElementNS('http://www.w3.org/2000/svg', 'text');
      txt.setAttribute('x', W - P.r + 8); txt.setAttribute('y', y + 4);
      txt.setAttribute('text-anchor', 'start'); txt.setAttribute('font-size', '11');
      txt.setAttribute('fill', '#888888'); txt.setAttribute('font-family', 'Noto Sans JP, sans-serif');
      txt.textContent = v.toFixed(opts.autoYRight ? 1 : 0);
      svg.appendChild(txt);
    }
  }

  // ラベル間引き：モバイルは少なめ
  const labelStep = Math.max(1, Math.ceil(data.length / (isMobile ? 6 : 10)));
  data.forEach((d, i) => {
    if (i % labelStep !== 0 && i !== data.length - 1) return;
    const txt = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    txt.setAttribute('x', xScale(i)); txt.setAttribute('y', H - 8);
    txt.setAttribute('text-anchor', 'middle'); txt.setAttribute('font-size', '10');
    txt.setAttribute('fill', '#888888'); txt.setAttribute('font-family', 'Noto Sans JP, sans-serif');
    txt.textContent = d.date;
    svg.appendChild(txt);
  });

  // 凡例
  if (series.length > 1) {
    const legend = document.createElementNS('http://www.w3.org/2000/svg', 'g');
    let legendX = P.l;
    series.forEach((s) => {
      const swatch = document.createElementNS('http://www.w3.org/2000/svg', 'line');
      swatch.setAttribute('x1', legendX); swatch.setAttribute('x2', legendX + 16);
      swatch.setAttribute('y1', 10); swatch.setAttribute('y2', 10);
      swatch.setAttribute('stroke', s.color); swatch.setAttribute('stroke-width', '2');
      if (s.dashed) swatch.setAttribute('stroke-dasharray', '4 4');
      legend.appendChild(swatch);
      const txt = document.createElementNS('http://www.w3.org/2000/svg', 'text');
      txt.setAttribute('x', legendX + 22); txt.setAttribute('y', 14);
      txt.setAttribute('font-size', '11'); txt.setAttribute('fill', '#222222');
      txt.setAttribute('font-family', 'Noto Sans JP, sans-serif');
      const axisIndicator = s.axis === 'right' ? ' →' : (series.some(x => x.axis === 'right') ? ' ←' : '');
      txt.textContent = s.label + axisIndicator;
      legend.appendChild(txt);
      legendX += 22 + (s.label.length + axisIndicator.length) * 8 + 16;
    });
    svg.appendChild(legend);
  }

  // 各シリーズの線とドット
  series.forEach(s => {
    const ax = s.axis || 'left';
    const sc = ax === 'right' ? rightScale : leftScale;
    if (!sc) return;
    const points = [];
    data.forEach((d, i) => {
      if (d[s.key] !== null && d[s.key] !== undefined) {
        points.push({ x: xScale(i), y: sc.scale(d[s.key]), v: d[s.key], date: d.date });
      }
    });
    if (points.length < 1) return;
    if (points.length >= 2) {
      const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
      const dStr = points.map((p, i) => (i === 0 ? 'M' : 'L') + p.x + ',' + p.y).join(' ');
      path.setAttribute('d', dStr);
      path.setAttribute('stroke', s.color);
      path.setAttribute('stroke-width', '2');
      path.setAttribute('fill', 'none');
      if (s.dashed) path.setAttribute('stroke-dasharray', '4 4');
      svg.appendChild(path);
    }
    points.forEach(p => {
      const c = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
      c.setAttribute('cx', p.x); c.setAttribute('cy', p.y);
      const r = s.dashed ? 0 : (data.length > 60 ? 1.5 : data.length > 30 ? 2.5 : 3.5);
      c.setAttribute('r', r);
      c.setAttribute('fill', s.color);
      c.style.cursor = 'pointer';
      const hit = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
      hit.setAttribute('cx', p.x); hit.setAttribute('cy', p.y); hit.setAttribute('r', 8);
      hit.setAttribute('fill', 'transparent'); hit.style.cursor = 'pointer';
      const unit = s.unit || opts.unit || '';
      const decimals = s.decimals != null ? s.decimals : (opts.autoY ? 1 : 0);
      const html = `${p.date}<br>${s.label}: ${p.v.toFixed(decimals)}${unit ? ' ' + unit : ''}`;
      hit.addEventListener('mouseenter', (e) => showTip(e, html));
      hit.addEventListener('mousemove', (e) => showTip(e, html));
      hit.addEventListener('mouseleave', hideTip);
      svg.appendChild(c);
      svg.appendChild(hit);
    });
  });

  return svg;
}

// ============================================================================
// 下部タブ切替
// ============================================================================
document.querySelectorAll('.bottom-tab').forEach(btn => {
  btn.addEventListener('click', () => {
    const v = btn.dataset.view;
    document.querySelectorAll('.bottom-tab').forEach(b => b.classList.toggle('active', b === btn));
    document.querySelectorAll('.view').forEach(el => el.classList.toggle('active', el.id === `view-${v}`));
    // ビュー切替時に最上部にスクロール
    window.scrollTo({ top: 0, behavior: 'instant' });
    // 各ビューで再描画が必要なものを呼ぶ
    if (v === 'input') renderInput();
    if (v === 'record') renderRecordsTable();
    if (v === 'graph') renderTrends();
    if (v === 'detail') renderDetail();
  });
});

// 画面リサイズ時にグラフを再描画（モバイル/デスクトップviewBox切替のため）
let resizeTimer = null;
let lastIsMobile = window.innerWidth < 640;
window.addEventListener('resize', () => {
  if (resizeTimer) clearTimeout(resizeTimer);
  resizeTimer = setTimeout(() => {
    const nowMobile = window.innerWidth < 640;
    // ブレイクポイントをまたいだ時だけ再描画
    if (nowMobile !== lastIsMobile) {
      lastIsMobile = nowMobile;
      const graphActive = document.getElementById('view-graph').classList.contains('active');
      if (graphActive) renderTrends();
    }
  }, 200);
});

// ============================================================================
// 期間ナビゲーション（前/次ボタン + スワイプ）
// ============================================================================
document.getElementById('period-prev').addEventListener('click', () => {
  currentOffset++;
  renderTrends();
});
document.getElementById('period-next').addEventListener('click', () => {
  if (currentOffset > 0) {
    currentOffset--;
    renderTrends();
  }
});

// グラフ領域のスワイプ対応
(() => {
  const cc = document.getElementById('charts-container');
  let touchStartX = null;
  let touchStartY = null;
  let touchStartTime = 0;
  cc.addEventListener('touchstart', (e) => {
    if (e.touches.length !== 1) return;
    touchStartX = e.touches[0].clientX;
    touchStartY = e.touches[0].clientY;
    touchStartTime = Date.now();
  }, { passive: true });
  cc.addEventListener('touchend', (e) => {
    if (touchStartX === null) return;
    const dx = e.changedTouches[0].clientX - touchStartX;
    const dy = e.changedTouches[0].clientY - touchStartY;
    const dt = Date.now() - touchStartTime;
    touchStartX = null;
    // 横スワイプ判定: |dx|>60px、縦より明確に大きい、500ms以内
    if (Math.abs(dx) > 60 && Math.abs(dx) > Math.abs(dy) * 1.5 && dt < 500) {
      if (dx > 0) {
        // 右スワイプ → 過去へ
        currentOffset++;
        renderTrends();
      } else {
        // 左スワイプ → 未来へ
        if (currentOffset > 0) {
          currentOffset--;
          renderTrends();
        }
      }
    }
  }, { passive: true });
})();

// ============================================================================
// 起動
// ============================================================================
renderRecordsTable();
renderTrends();
bindInputView();
renderInput();
</script>

</body>
</html>
